services:
  redis:
    image: redis:7-alpine
    container_name: onsys_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: onsys_mailhog
    restart: unless-stopped
    ports:
      - "1026:1025"   # SMTP (1025 taken by itm_mailhog)
      - "8026:8025"   # Web UI (8025 taken by itm_mailhog)

